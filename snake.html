<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .score-container, .high-score-container {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .score-value, .high-score-value {
            color: #00ff88;
            font-size: 2rem;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .controls p {
            margin: 5px 0;
            font-size: 1.1rem;
        }
        .keys {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }
        .key-row {
            display: flex;
        }
        .key {
            width: 60px;
            height: 60px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }
        .key.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            box-shadow: 0 0 15px #00ff88;
        }
        canvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: #0f1525;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #startBtn {
            background: linear-gradient(to right, #00ff88, #00cc6a);
            color: #000;
        }
        #pauseBtn {
            background: linear-gradient(to right, #ffaa00, #ff7700);
            color: #000;
        }
        #resetBtn {
            background: linear-gradient(to right, #ff4444, #cc0000);
            color: #fff;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #ff4444;
            display: none;
            z-index: 100;
            width: 80%;
            max-width: 500px;
        }
        .game-over h2 {
            color: #ff4444;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            canvas {
                width: 95vw;
                height: 95vw;
                max-width: 500px;
                max-height: 500px;
            }
            .game-info {
                flex-direction: column;
                gap: 15px;
            }
            .key {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake Game</h1>

        <div class="game-info">
            <div class="score-container">
                Score: <span id="score" class="score-value">0</span>
            </div>
            <div class="high-score-container">
                High Score: <span id="highScore" class="high-score-value">0</span>
            </div>
        </div>

        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to control the snake</p>
            <div class="keys">
                <div class="key-row">
                    <div class="key" id="keyUp">↑</div>
                </div>
                <div class="key-row">
                    <div class="key" id="keyLeft">←</div>
                    <div class="key" id="keyDown">↓</div>
                    <div class="key" id="keyRight">→</div>
                </div>
            </div>
            <p>Eat the <span style="color:#ff4444">●</span> food to grow and earn points</p>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="buttons">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset Game</button>
        </div>

        <div class="footer">
            <p>Snake Game created with HTML5 Canvas & JavaScript</p>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h2>Game Over!</h2>
        <p>Your score: <span id="finalScore">0</span></p>
        <p>High score: <span id="finalHighScore">0</span></p>
        <button id="restartBtn" style="background: linear-gradient(to right, #00ff88, #00cc6a); color: #000; padding: 15px 30px; font-size: 1.2rem; border-radius: 10px; border: none; cursor: pointer;">Play Again</button>
    </div>

    <script>
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const keyUp = document.getElementById('keyUp');
        const keyDown = document.getElementById('keyDown');
        const keyLeft = document.getElementById('keyLeft');
        const keyRight = document.getElementById('keyRight');

        // Game constants
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;

        // Game state
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 150; // ms
        let gameLoop;
        let isPaused = false;
        let isGameOver = false;
        let isRunning = false;

        // Initialize game
        function initGame() {
            // Initialize snake
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];

            // Generate first food
            generateFood();

            // Reset game state
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 150;
            isPaused = false;
            isGameOver = false;
            isRunning = false;

            // Update UI
            scoreElement.textContent = score;
            highScoreElement.textContent = highScore;
            pauseBtn.textContent = 'Pause';

            // Hide game over screen
            gameOverScreen.style.display = 'none';

            // Draw initial state
            draw();
        }

        // Generate food at random position
        function generateFood() {
            let foodOnSnake;
            do {
                foodOnSnake = false;
                food = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight)
                };

                // Check if food is on snake
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        foodOnSnake = true;
                        break;
                    }
                }
            } while (foodOnSnake);
        }

        // Draw game elements
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0f1525';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                // Head is different color
                if (index === 0) {
                    ctx.fillStyle = '#00ff88';
                    ctx.strokeStyle = '#00cc6a';
                } else {
                    // Gradient body
                    const intensity = 150 - (index * 5);
                    ctx.fillStyle = `rgb(0, ${Math.max(100, intensity)}, 100)`;
                    ctx.strokeStyle = '#00aa55';
                }

                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = gridSize / 5;

                    // Determine eye positions based on direction
                    let leftEyeX, leftEyeY, rightEyeX, rightEyeY;

                    switch(direction) {
                        case 'right':
                            leftEyeX = segment.x * gridSize + gridSize - eyeSize * 2;
                            leftEyeY = segment.y * gridSize + eyeSize * 2;
                            rightEyeX = segment.x * gridSize + gridSize - eyeSize * 2;
                            rightEyeY = segment.y * gridSize + gridSize - eyeSize * 3;
                            break;
                        case 'left':
                            leftEyeX = segment.x * gridSize + eyeSize;
                            leftEyeY = segment.y * gridSize + eyeSize * 2;
                            rightEyeX = segment.x * gridSize + eyeSize;
                            rightEyeY = segment.y * gridSize + gridSize - eyeSize * 3;
                            break;
                        case 'up':
                            leftEyeX = segment.x * gridSize + eyeSize * 2;
                            leftEyeY = segment.y * gridSize + eyeSize;
                            rightEyeX = segment.x * gridSize + gridSize - eyeSize * 3;
                            rightEyeY = segment.y * gridSize + eyeSize;
                            break;
                        case 'down':
                            leftEyeX = segment.x * gridSize + eyeSize * 2;
                            leftEyeY = segment.y * gridSize + gridSize - eyeSize * 2;
                            rightEyeX = segment.x * gridSize + gridSize - eyeSize * 3;
                            rightEyeY = segment.y * gridSize + gridSize - eyeSize * 2;
                            break;
                    }

                    ctx.beginPath();
                    ctx.arc(leftEyeX, leftEyeY, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(rightEyeX, rightEyeY, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw food
            ctx.fillStyle = '#ff4444';
            ctx.strokeStyle = '#ff0000';
            ctx.beginPath();
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            const radius = gridSize / 2 - 2;
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Draw shine effect on food
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.arc(centerX - radius/3, centerY - radius/3, radius/4, 0, Math.PI * 2);
            ctx.fill();

            // Draw pause overlay if game is paused
            if (isPaused && !isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);

                ctx.font = '20px Arial';
                ctx.fillText('Press SPACE or click Resume to continue', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        // Update game state
        function update() {
            if (isPaused || isGameOver) return;

            // Update direction
            direction = nextDirection;

            // Calculate new head position
            const head = {...snake[0]};

            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Check wall collision
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // Add new head to snake
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                // Increase score
                score += 10;
                scoreElement.textContent = score;

                // Update high score
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                // Generate new food
                generateFood();

                // Increase speed slightly every 5 foods
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }

            // Update visual key indicators
            updateKeyIndicators();

            // Draw updated game state
            draw();
        }

        // Game over function
        function gameOver() {
            isGameOver = true;
            isRunning = false;
            clearInterval(gameLoop);

            // Update final score display
            finalScoreElement.textContent = score;
            finalHighScoreElement.textContent = highScore;

            // Show game over screen
            gameOverScreen.style.display = 'block';

            // Reset key indicators
            resetKeyIndicators();
        }

        // Update visual key indicators
        function updateKeyIndicators() {
            // Reset all keys
            resetKeyIndicators();

            // Highlight active direction key
            switch(direction) {
                case 'up': keyUp.classList.add('active'); break;
                case 'down': keyDown.classList.add('active'); break;
                case 'left': keyLeft.classList.add('active'); break;
                case 'right': keyRight.classList.add('active'); break;
            }
        }

        // Reset key indicators
        function resetKeyIndicators() {
            keyUp.classList.remove('active');
            keyDown.classList.remove('active');
            keyLeft.classList.remove('active');
            keyRight.classList.remove('active');
        }

        // Start game loop
        function startGame() {
            if (isRunning) return;

            isRunning = true;
            isPaused = false;
            pauseBtn.textContent = 'Pause';

            if (gameLoop) {
                clearInterval(gameLoop);
            }

            gameLoop = setInterval(update, gameSpeed);
            draw();
        }

        // Pause/Resume game
        function togglePause() {
            if (isGameOver || !isRunning) return;

            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';

            if (!isPaused) {
                draw(); // Remove pause overlay
            } else {
                draw(); // Draw pause overlay
            }
        }

        // Handle keyboard input
        function handleKeyDown(e) {
            if (isGameOver) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction !== 'down') nextDirection = 'up';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction !== 'up') nextDirection = 'down';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction !== 'right') nextDirection = 'left';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction !== 'left') nextDirection = 'right';
                    e.preventDefault();
                    break;
                case ' ':
                    // Space toggles pause
                    if (isRunning) {
                        togglePause();
                    } else {
                        startGame();
                    }
                    e.preventDefault();
                    break;
                case 'Enter':
                    if (isGameOver) {
                        initGame();
                        startGame();
                    }
                    break;
            }
        }

        // Event listeners
        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                startGame();
            }
        });

        pauseBtn.addEventListener('click', togglePause);

        resetBtn.addEventListener('click', () => {
            clearInterval(gameLoop);
            initGame();
        });

        restartBtn.addEventListener('click', () => {
            initGame();
            startGame();
        });

        document.addEventListener('keydown', handleKeyDown);

        // Touch controls for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            if (isGameOver) return;

            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevent scrolling
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (isGameOver || !touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            // Only register significant swipes
            if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    // Horizontal swipe
                    if (dx > 0 && direction !== 'left') {
                        nextDirection = 'right';
                    } else if (dx < 0 && direction !== 'right') {
                        nextDirection = 'left';
                    }
                } else {
                    // Vertical swipe
                    if (dy > 0 && direction !== 'up') {
                        nextDirection = 'down';
                    } else if (dy < 0 && direction !== 'down') {
                        nextDirection = 'up';
                    }
                }
            }

            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, { passive: false });

        // Initialize the game
        initGame();
        highScoreElement.textContent = highScore;
    </script>
</body>
</html>
